<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SignalTone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<header class="app-header">

<img src="logo-84.png" width="84" height="84" alt="SignalTone"/>

<h1>SignalTone</h1>

<p>A dithering and diffusion system for Photoshop.</p>

</header>
<main>

<section>
<label for="engine">Dither Engine</label>
<select id="engine">
<option value="atkinson">Atkinson</option>
<option value="floyd">Floyd-Steinberg</option>
<option value="threshold">Threshold</option>
<option value="drift">Printer-Drift</option>
</select>

<label for="paletteMode">Palette Mode</label>
<select id="paletteMode">
<option value="two">Two Color</option>
<option value="four">Four Color</option>
</select>

<label for="palette">Palette</label>
<select id="palette"></select>

<div class="palettePreview" id="palettePreview">
<span></span><span></span><span></span><span></span>
</div>
</section>

<section>
<h2>Signal Controls</h2>

<div class="control">
<div class="controlBody">
<label for="threshold">Threshold Bias</label>
<input type="range" id="threshold" min="1" max="255" value="128">
<div class="value" id="thresholdValue">128</div>
</div>
</div>

<div class="control">
<div class="controlBody">
<label for="diffusion">Diffusion Strength</label>
<input type="range" id="diffusion" min="0" max="100" value="96">
<div class="value" id="diffusionValue">96</div>
</div>

<div class="control">
<div class="controlBody">
<label for="signalResponse">Signal Response</label>
<input type="range" id="signalResponse" min="0" max="100" value="48">
<div class="value" id="signalResponseValue">48</div>
</div>
</div>

</div>

<div class="control">
<div class="controlBody">
<label for="transmissionClarity">Transmission Clarity</label>
<div class="clarity-labels">
<span>Soft Signal</span>
<span>Hard Signal</span>
</div>
<input type="range" id="transmissionClarity" min="-100" max="100" value="0">
<div class="value" id="transmissionClarityValue">0</div>
</div>
</div>

</section>

<section>
<h2>Edge Character</h2>

<label for="edgeCharacter">Mode</label>
<select id="edgeCharacter">
<option value="clean">Clean</option>
<option value="dryplate">Dry Plate</option>
<option value="melt">Toner Leak</option>
</select>

<div class="control">
<div class="controlBody">
<label for="edgeStrength">Edge Strength</label>
<input type="range" id="edgeStrength" min="0" max="100" value="48">
<div class="value" id="edgeStrengthValue">48</div>
</div>
</div>
</section>

<section>
<h2>Contamination</h2>

<label for="textureType">Type</label>
<select id="textureType">
<option value="none">None</option>
<option value="xeroxGrit">Xerox Grit</option>
<option value="fixerResidue">Fixer Residue</option>
</select>

<div class="control">
<div class="controlBody">
<label for="textureAmount">Intensity</label>
<input type="range" id="textureAmount" min="0" max="120" value="24">
<div class="value" id="textureAmountValue">24</div>
</div>
</div>

<div class="control">
<div class="controlBody">
<label for="noise">Noise</label>
<input type="range" id="noise" min="0" max="100" value="12">
<div class="value" id="noiseValue">12</div>
</div>
</div>

<div class="previewToggleRow">
<label class="previewToggle">
<input type="checkbox" id="livePreview">
<span>Live Visual Preview</span>
</label>
</div>

<button id="applyEngine">Apply SignalTone Process</button>

</section>

</main>

<footer>
<div id="status">READY</div>
<div class="version">SignalTone v1.0</div>
</footer>

</div>
<script src="main.js"></script>
</body>
</html>
